<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Personify</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <header>
        <div class="brand">
            <img src="../icons/icon48.png" alt="Personify logo" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;" />
            <span class="brand-name">Personify</span>
        </div>
        <div class="header-actions">
            <a href="http://localhost:3000" target="_blank" class="icon-btn" title="Open dashboard">↗</a>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" data-tab="autofill">✎ Autofill</button>
        <button class="tab" data-tab="profile">𖠋 Profile</button>
    </div>

    <div id="tab-autofill" class="tab-content active">
        <div id="questions-list"></div>
        <div id="no-questions" class="empty-state" style="display:none">
            <p>No personal statement fields detected on this page.</p>
        </div>
        <div id="loading" class="loading-state">
            <p>Scanning page...</p>
        </div>
        <div id="autofill-footer" style="display:none;padding:12px 16px;border-top:1px solid #f0f0f0;">
            <button id="personify-all-btn" class="autofill-btn">⟡ Personify My Application</button>
            <div id="footer-status" class="card-status" style="margin-top:6px;"></div>
        </div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div id="profile-loading" class="loading-state"><p>Loading profile...</p></div>
        <div id="profile-signed-out" style="display:none;padding:16px;">
            <p style="font-size:13px;color:#888;margin-bottom:12px;text-align:center;">Sign in to see your profile.</p>
            <div class="form-group" style="margin-bottom:8px;">
                <input id="login-email" type="email" placeholder="Email" style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;" />
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <input id="login-password" type="password" placeholder="Password" style="width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;" />
            </div>
            <div id="login-error" style="font-size:12px;color:#c0392b;margin-bottom:8px;display:none;"></div>
            <button id="login-btn" class="autofill-btn">Sign in</button>
        </div>
        <div id="profile-content" style="display:none;">
            <div class="profile-card">
                <div class="avatar" id="profile-avatar">?</div>
                <div class="profile-info">
                    <div class="profile-name" id="profile-name">—</div>
                    <div class="profile-email" id="profile-email">—</div>
                </div>
            </div>
            <div class="profile-section">
                <div class="profile-row">
                    <span class="profile-label">Resume</span>
                    <span id="profile-resume-status" class="profile-value">Checking...</span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Additional Documents</span>
                    <span id="profile-docs-status" class="profile-value">Checking...</span>
                </div>
            </div>
            <a href="http://localhost:3000/settings" target="_blank" class="dashboard-link">
                Manage documents in dashboard ↗
            </a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
